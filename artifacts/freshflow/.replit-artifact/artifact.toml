kind = "mobile"
previewPath = "/"
title = "FreshFlow"
version = "1.0.0"
id = "artifacts/freshflow"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21729

[services.development]
run = "pnpm --filter @workspace/freshflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/freshflow", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/freshflow", "run", "serve" ]

[services.env]
PORT = "21729"
BASE_PATH = "/"
