name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      
    - name: Build project
      run: pnpm run build
      env:
        PORT: 3000
        BASE_PATH: "/"
        EXPO_PUBLIC_DOMAIN: "localhost"

    - name: Upload Mockup Sandbox Build
      uses: actions/upload-artifact@v4
      with:
        name: mockup-sandbox-build
        path: artifacts/mockup-sandbox/dist/
        
    - name: Upload Freshflow Build
      uses: actions/upload-artifact@v4
      with:
        name: freshflow-build
        path: artifacts/freshflow/static-build/
